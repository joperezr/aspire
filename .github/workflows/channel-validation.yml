name: Channel Validation

on:
  schedule:
    # Run every 4 hours for the dev channel
    - cron: '0 */4 * * *'

  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to validate'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - release
      platform:
        description: 'Platform to validate (all runs the full matrix)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu-latest
          - windows-latest
          - macos-latest

permissions: {}

concurrency:
  group: channel-validation-${{ github.event.inputs.channel || 'dev' }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.channel }} / ${{ matrix.platform }}
    if: github.repository == 'microsoft/aspire' || github.repository == 'joperezr/aspire'
    strategy:
      fail-fast: false
      matrix:
        channel: ${{ github.event_name == 'schedule' && fromJson('["dev"]') || fromJson(format('["{0}"]', github.event.inputs.channel)) }}
        platform: ${{ (github.event_name == 'schedule' || github.event.inputs.platform == 'all') && fromJson('["ubuntu-latest", "windows-latest", "macos-latest"]') || fromJson(format('["{0}"]', github.event.inputs.platform)) }}

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    permissions:
      contents: read
      issues: write

    env:
      CHANNEL_VALIDATION_CHANNEL: ${{ matrix.channel }}
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_GENERATE_ASPNET_CERTIFICATE: 'false'

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        global-json-file: global.json

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'

    - name: Record validation metadata
      id: metadata
      shell: bash
      run: |
        echo "channel=${{ matrix.channel }}" >> "$GITHUB_OUTPUT"
        echo "platform=${{ matrix.platform }}" >> "$GITHUB_OUTPUT"
        echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

    - name: Build test project
      shell: bash
      run: |
        dotnet build tests/Aspire.ChannelValidation.Tests/Aspire.ChannelValidation.Tests.csproj \
          -c Release \
          -p:RunChannelValidationTests=true

    - name: Run channel validation tests
      id: run-tests
      shell: bash
      run: |
        dotnet test tests/Aspire.ChannelValidation.Tests/Aspire.ChannelValidation.Tests.csproj \
          -c Release \
          --no-build \
          -p:RunChannelValidationTests=true \
          --results-directory "$GITHUB_WORKSPACE/testresults" \
          --logger "trx;LogFileName=channel-validation-${{ matrix.channel }}-${{ matrix.platform }}.trx" \
          --logger "console;verbosity=detailed" \
          -- --hangdump --hangdump-timeout 10m --crashdump

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: channel-validation-results-${{ matrix.channel }}-${{ matrix.platform }}
        path: |
          ${{ github.workspace }}/testresults/
        retention-days: 30

    - name: Upload terminal recordings
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: channel-validation-recordings-${{ matrix.channel }}-${{ matrix.platform }}
        path: |
          ${{ github.workspace }}/testresults/recordings/
        retention-days: 30
        if-no-files-found: ignore

    - name: Post test summary
      if: always() && steps.run-tests.outcome != 'skipped'
      shell: bash
      run: |
        echo "## 🧪 Channel Validation Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
        echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Channel** | \`${{ matrix.channel }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Platform** | \`${{ matrix.platform }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Result** | ${{ steps.run-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
        echo "| **Timestamp** | ${{ steps.metadata.outputs.timestamp }} |" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        # Parse TRX file for individual test results
        TRX_FILE=$(find "$GITHUB_WORKSPACE/testresults" -name "*.trx" -type f 2>/dev/null | head -1)
        if [ -n "$TRX_FILE" ]; then
          echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Result | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

          # Extract test results from TRX XML
          # TRX uses <UnitTestResult testName="..." outcome="Passed|Failed|NotExecuted" duration="HH:MM:SS.mmm" />
          grep -oP '<UnitTestResult[^>]*>' "$TRX_FILE" | while read -r line; do
            test_name=$(echo "$line" | grep -oP 'testName="[^"]*"' | sed 's/testName="//;s/"//')
            outcome=$(echo "$line" | grep -oP 'outcome="[^"]*"' | sed 's/outcome="//;s/"//')
            duration=$(echo "$line" | grep -oP 'duration="[^"]*"' | sed 's/duration="//;s/"//')

            # Short test name (class.method only)
            short_name=$(echo "$test_name" | sed 's/.*\.\([^.]*\.\)/\1/')

            case "$outcome" in
              Passed)  icon="✅" ;;
              Failed)  icon="❌" ;;
              *)       icon="⏭️" ;;
            esac

            echo "| ${icon} ${short_name} | ${outcome} | ${duration} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

        # List terminal recordings with asciinema player links
        RECORDINGS_DIR="$GITHUB_WORKSPACE/testresults/recordings"
        if [ -d "$RECORDINGS_DIR" ] && [ "$(ls -A "$RECORDINGS_DIR" 2>/dev/null)" ]; then
          echo "### 🎬 Terminal Recordings" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the \`channel-validation-recordings-${{ matrix.channel }}-${{ matrix.platform }}\` artifact and replay with:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo 'pip install asciinema && asciinema play <recording>.cast' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Or use the online player at https://asciinema-player.pages.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Available recordings:**" >> "$GITHUB_STEP_SUMMARY"
          for f in "$RECORDINGS_DIR"/*.cast; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              size=$(du -h "$f" | cut -f1)
              echo "- \`${name}\` (${size})" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Ensure channel-validation-failure label exists
      if: failure() && steps.run-tests.outcome == 'failure'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      with:
        script: |
          try {
            await github.rest.issues.getLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'channel-validation-failure'
            });
          } catch (e) {
            if (e.status === 404) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'channel-validation-failure',
                color: 'd93f0b',
                description: 'Failure detected in channel validation smoke tests'
              });
            }
          }

    - name: Create issue on failure
      if: failure() && steps.run-tests.outcome == 'failure'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      with:
        script: |
          const fs = require('fs');
          const channel = '${{ matrix.channel }}';
          const platform = '${{ matrix.platform }}';
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const timestamp = '${{ steps.metadata.outputs.timestamp }}';

          const title = `[Channel Validation] ${channel}/${platform}: smoke tests failed`;
          const dedupeMarker = `<!-- channel-validation-dedupe:${channel}/${platform} -->`;

          // Search for existing open issue with same dedupe marker
          const { data: searchResults } = await github.rest.search.issuesAndPullRequests({
            q: `repo:${context.repo.owner}/${context.repo.repo} is:issue "${dedupeMarker}" in:body`,
            per_page: 5
          });

          const existingIssue = searchResults.items.find(i => !i.pull_request && i.state === 'open');

          const body = [
            dedupeMarker,
            '',
            `## Channel Validation Failure`,
            '',
            `| Property | Value |`,
            `|----------|-------|`,
            `| **Channel** | \`${channel}\` |`,
            `| **Platform** | \`${platform}\` |`,
            `| **Timestamp** | ${timestamp} |`,
            `| **Workflow Run** | [View run](${runUrl}) |`,
            '',
            `### What happened`,
            `The channel validation smoke tests failed for the \`${channel}\` channel on \`${platform}\`.`,
            `This means the published CLI or its packages may have issues that affect end users.`,
            '',
            `### Next steps`,
            `1. Check the [workflow run](${runUrl}) for detailed test output and terminal recordings`,
            `2. Identify which test tier failed (installation, lifecycle, package management, or publishing)`,
            `3. Investigate the root cause in the latest build published to the \`${channel}\` channel`,
            '',
            `### Related`,
            `- See [#16043](https://github.com/microsoft/aspire/issues/16043) for an example of a signing issue caught by this validation`,
          ].join('\n');

          if (existingIssue) {
            // Update existing issue with new failure comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: [
                `### New failure detected`,
                '',
                `| Property | Value |`,
                `|----------|-------|`,
                `| **Timestamp** | ${timestamp} |`,
                `| **Workflow Run** | [View run](${runUrl}) |`,
              ].join('\n')
            });

            core.info(`Updated existing issue #${existingIssue.number}`);
          } else {
            // Check for closed issue to reopen
            const closedIssue = searchResults.items.find(i => !i.pull_request && i.state === 'closed');

            if (closedIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: closedIssue.number,
                state: 'open'
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: closedIssue.number,
                body: [
                  `### Failure recurred`,
                  '',
                  `| Property | Value |`,
                  `|----------|-------|`,
                  `| **Timestamp** | ${timestamp} |`,
                  `| **Workflow Run** | [View run](${runUrl}) |`,
                ].join('\n')
              });

              core.info(`Reopened issue #${closedIssue.number}`);
            } else {
              // Create new issue
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['channel-validation-failure', 'area-acquisition', 'untriaged']
              });

              core.info(`Created issue #${newIssue.number}: ${newIssue.html_url}`);
            }
          }
